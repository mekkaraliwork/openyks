<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDF Görüntüleyici · openyks</title>
<style>
  :root{--bg:#06070d;--fg:#eef0fb;--muted:#8a91ad;--border:rgba(255,255,255,.1);--grad:linear-gradient(135deg,#5b8cff,#7c5cff)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,"Inter",sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(13,15,26,.85);backdrop-filter:blur(10px)}
  header a.back{color:var(--muted);padding:8px 12px;border:1px solid var(--border);border-radius:10px;text-decoration:none;font-size:14px}
  header a.back:hover{color:var(--fg)}
  header h1{font-size:15px;font-weight:600;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header .actions{display:flex;gap:8px}
  .btn{padding:8px 12px;border-radius:10px;font-size:13px;text-decoration:none;border:1px solid var(--border);color:var(--fg)}
  .btn.primary{background:var(--grad);border-color:transparent;color:#0a0c18;font-weight:600}
  main{height:calc(100vh - 56px);background:#0a0c18}
  iframe{width:100%;height:100%;border:0;background:#222}
  .msg{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header>
  <a class="back" href="exams.html">← Arşiv</a>
  <h1 id="title">Yükleniyor…</h1>
  <div class="actions" id="actions"></div>
</header>
<main id="main"><div class="msg">Manifest okunuyor…</div></main>
<script>
const qs = new URLSearchParams(location.search);
const want = { year: Number(qs.get('year')), type: (qs.get('type')||'').toUpperCase(), language: qs.get('language')||null };

(async () => {
  let m;
  try {
    const r = await fetch('data/exams/osym-yks-manifest.json',{cache:'no-store'});
    m = await r.json();
  } catch(e){
    document.getElementById('main').innerHTML = '<div class="msg">Manifest yüklenemedi.</div>'; return;
  }
  const rec = m.exams.find(x => x.year===want.year && x.type===want.type && (x.language||null)===(want.language||null));
  if(!rec){ document.getElementById('main').innerHTML = '<div class="msg">Bu sınav manifestte yok.</div>'; return; }
  if(rec.status !== 'downloaded' || !rec.booklet.localPath){
    document.getElementById('main').innerHTML = '<div class="msg">Bu PDF henüz indirilmemiş. Lütfen <code>npm run exams:download</code> komutunu çalıştırın.</div>'; return;
  }
  // Sadece manifest'te kayıtlı local yola izin ver
  const safe = rec.booklet.localPath.replace(/^\/+/, '');
  if(!/^assets\/exams\//.test(safe)){
    document.getElementById('main').innerHTML = '<div class="msg">Geçersiz dosya yolu.</div>'; return;
  }
  document.getElementById('title').textContent = rec.title;
  document.getElementById('actions').innerHTML =
    `<a class="btn" href="${safe}" download>İndir</a>`+
    `<a class="btn" href="${rec.booklet.sourceUrl}" target="_blank" rel="noopener">Kaynak</a>`+
    `<a class="btn primary" href="${safe}" target="_blank" rel="noopener">Yeni sekmede aç</a>`;
  document.getElementById('main').innerHTML = `<iframe src="${safe}#view=FitH" title="${rec.title}"></iframe>`;
})();
</script>
</body>
</html>
